name: 🌐 Deploy Application

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'بيئة النشر'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: 🌐 Deploy to ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build
        env:
          NEXT_PUBLIC_RPC_URL: ${{ secrets.NEXT_PUBLIC_RPC_URL }}
          NEXT_PUBLIC_CHAIN_ID: ${{ inputs.environment == 'production' && '42161' || '421614' }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}

      - name: 🚀 Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ inputs.environment == 'production' && '--prod' || '' }}

      - name: 📢 Notify deployment
        run: |
          echo "✅ تم النشر بنجاح!"
          echo "🌐 URL: ${{ steps.deploy.outputs.preview-url }}"
          
      - name: 💬 Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🌐 Preview Deployment
              
              ✅ تم نشر نسخة المعاينة بنجاح!
              
              **URL:** ${{ steps.deploy.outputs.preview-url }}
              
              ---
              <sub>🤖 تم النشر تلقائياً بواسطة GitHub Actions</sub>
              `
            })

  health-check:
    name: 🔍 Health Check
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: 🔍 Check application health
        run: |
          echo "🔍 جاري فحص صحة التطبيق..."
          sleep 10
          
          # استبدل بالرابط الفعلي
          HEALTH_URL="${{ secrets.APP_URL }}/api/health"
          
          response=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL)
          
          if [ "$response" = "200" ]; then
            echo "✅ التطبيق يعمل بشكل صحيح!"
          else
            echo "❌ خطأ في التطبيق: HTTP $response"
            exit 1
          fi
